name: Deploy to Synology NAS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, gpu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (Docker Compose)
        env:
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.TRAVEL_GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.TRAVEL_GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.TRAVEL_GOOGLE_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.TRAVEL_BASE_URL }}
          TARGET_DIR: /volume1/docker/travel-app
        run: |
          set -euo pipefail

          echo "Deploying to: $TARGET_DIR"
          mkdir -p "$TARGET_DIR"

          # Copy project files
          rsync -a --delete \
            --exclude node_modules \
            --exclude .next \
            --exclude .git \
            --exclude .env \
            --exclude .env.local \
            ./ "$TARGET_DIR/"

          # Write .env
          cat > "$TARGET_DIR/.env" <<EOF
          GOOGLE_SERVICE_ACCOUNT_EMAIL=$GOOGLE_SERVICE_ACCOUNT_EMAIL
          GOOGLE_PRIVATE_KEY=$GOOGLE_PRIVATE_KEY
          GOOGLE_SHEET_ID=$GOOGLE_SHEET_ID
          GEMINI_API_KEY=$GEMINI_API_KEY
          NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3333}
          EOF

          cd "$TARGET_DIR"
          docker compose down --remove-orphans || true
          docker compose up -d --build --remove-orphans

          echo
          echo "== Containers (ALL, post-deploy) =="
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          echo
          echo "== Docker compose ps =="
          docker compose ps -a || true
          echo
          echo "== Port 3333 check =="
          ss -tlnp 2>/dev/null | grep 3333 || netstat -tlnp 2>/dev/null | grep 3333 || echo "no ss/netstat"

          echo
          echo "== Smoke test (via docker exec) =="
          echo "Waiting for travel-app container to be ready..."
          sleep 10
          ready=0
          for i in $(seq 1 30); do
            if docker exec travel-app wget -q -O /dev/null http://127.0.0.1:3000/ 2>/dev/null; then
              ready=1
              break
            fi
            echo "Not ready yet ($i/30)..."
            sleep 5
          done

          if [ "$ready" -ne 1 ]; then
            echo "App did not become ready in time."
            docker logs --tail=100 travel-app || true
            exit 1
          fi

          echo "App is ready!"
          echo
          echo "== Logs (tail 30) =="
          docker logs --tail=30 travel-app || true
          echo "Deployment complete."
